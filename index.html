<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Balance</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #64FFDA; --secondary: #FF6B6B; --bg: #1a1a2e; --card: #16213e; }
        body { background-color: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .glass-card { background: var(--card); border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1); }
        .fab { position: fixed; bottom: 2rem; right: 2rem; background: var(--primary); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(100, 255, 218, 0.3); cursor: pointer; transition: transform 0.2s; }
        .fab:active { transform: scale(0.9); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 50; align-items: center; justify-content: center; }
        input, select { background: #0f3460 !important; color: white !important; border: 1px solid #533483 !important; }
    </style>
</head>
<body class="p-4 pb-24">

    <header class="text-center my-8">
        <h1 id="netBalance" class="text-5xl font-bold transition-all duration-500">₹0.00</h1>
        <p id="balanceHint" class="text-sm mt-2 opacity-80 uppercase tracking-widest">All Settled Up ✓</p>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="glass-card p-4 text-center">
            <p class="text-xs opacity-60">YOU OWE</p>
            <p id="youOwe" class="text-lg font-semibold text-red-400">₹0.00</p>
        </div>
        <div class="glass-card p-4 text-center">
            <p class="text-xs opacity-60">THEY OWE</p>
            <p id="theyOwe" class="text-lg font-semibold text-teal-400">₹0.00</p>
        </div>
    </div>

    <div id="transactionContainer" class="space-y-4">
        <div id="emptyState" class="text-center opacity-30 mt-20">
            <p class="text-4xl mb-2">📒</p>
            <p>No transactions yet.</p>
        </div>
    </div>

    <div class="fab" onclick="toggleModal(true)">
        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </div>

    <div id="modal" class="modal p-4">
        <div class="glass-card w-full max-w-md p-6 space-y-4">
            <h2 class="text-xl font-bold">New Transaction</h2>
            <input id="desc" type="text" placeholder="Description (e.g. Groceries)" class="w-full p-3 rounded-lg outline-none">
            <input id="amt" type="number" placeholder="Amount (₹)" class="w-full p-3 rounded-lg outline-none">
            
            <select id="type" class="w-full p-3 rounded-lg outline-none">
                <option value="MY_CC_CHARGE">💳 Family used MY credit card</option>
                <option value="SEND_MONEY">💸 I sent money to family</option>
                <option value="RECEIVE_MONEY">💰 Family sent money to me</option>
                <option value="FAMILY_CC_CHARGE">🏦 I used FAMILY credit card</option>
            </select>

            <div class="flex space-x-3 pt-4">
                <button onclick="toggleModal(false)" class="flex-1 p-3 opacity-60">Cancel</button>
                <button onclick="saveTransaction()" class="flex-1 p-3 bg-teal-400 text-slate-900 font-bold rounded-lg">Save</button>
            </div>
        </div>
    </div>

    <script>
        const types = {
            MY_CC_CHARGE: { label: "Family used your CC", emoji: "💳", factor: 1 },
            SEND_MONEY: { label: "You sent money", emoji: "💸", factor: 1 },
            RECEIVE_MONEY: { label: "Family sent money", emoji: "💰", factor: -1 },
            FAMILY_CC_CHARGE: { label: "You used family CC", emoji: "🏦", factor: -1 }
        };

        function toggleModal(show) {
            document.getElementById('modal').style.display = show ? 'flex' : 'none';
        }

        function saveTransaction() {
            const desc = document.getElementById('desc').value;
            const amt = parseFloat(document.getElementById('amt').value);
            const type = document.getElementById('type').value;

            if (!desc || !amt) return alert("Fill all fields");

            const transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
            transactions.unshift({
                id: Date.now(),
                desc, amt, type,
                date: new Date().toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' })
            });

            localStorage.setItem('transactions', JSON.stringify(transactions));
            toggleModal(false);
            render();
            // Clear inputs
            document.getElementById('desc').value = '';
            document.getElementById('amt').value = '';
        }

        function deleteTransaction(id) {
            let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
            transactions = transactions.filter(t => t.id !== id);
            localStorage.setItem('transactions', JSON.stringify(transactions));
            render();
        }

        function render() {
            const transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
            const container = document.getElementById('transactionContainer');
            const emptyState = document.getElementById('emptyState');
            
            container.innerHTML = '';
            emptyState.style.display = transactions.length ? 'none' : 'block';

            let youOwe = 0, theyOwe = 0;

            transactions.forEach(t => {
                const config = types[t.type];
                if (config.factor === 1) theyOwe += t.amt;
                else youOwe += t.amt;

                const card = document.createElement('div');
                card.className = "glass-card p-4 flex items-center justify-between";
                card.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <span class="text-2xl">${config.emoji}</span>
                        <div>
                            <p class="font-bold text-sm">${t.desc}</p>
                            <p class="text-[10px] opacity-50">${t.date}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold ${config.factor === 1 ? 'text-teal-400' : 'text-red-400'}">₹${t.amt.toFixed(2)}</p>
                        <button onclick="deleteTransaction(${t.id})" class="text-[10px] text-red-500 font-bold uppercase mt-1">Delete</button>
                    </div>
                `;
                container.appendChild(card);
            });

            const net = theyOwe - youOwe;
            const netEl = document.getElementById('netBalance');
            netEl.innerText = `₹${Math.abs(net).toFixed(2)}`;
            netEl.style.color = net >= 0 ? '#64FFDA' : '#FF6B6B';
            
            const hint = document.getElementById('balanceHint');
            if (Math.abs(net) < 0.01) hint.innerText = "All Settled Up ✓";
            else hint.innerText = net > 0 ? "Family owes you" : "You owe family";
            
            document.getElementById('youOwe').innerText = `₹${youOwe.toFixed(2)}`;
            document.getElementById('theyOwe').innerText = `₹${theyOwe.toFixed(2)}`;
        }

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }

        render();
    </script>
</body>
</html>
